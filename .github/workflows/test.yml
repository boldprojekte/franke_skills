name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit:
    name: unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run fast tests
        working-directory: skills/engineering/cxcc-subagent/scripts/tests
        run: |
          python3 -m unittest -v \
            test_cdx.StateDerivationTests \
            test_cdx.TurnAccountingRaceTests \
            test_cdx.WatchdogTests \
            test_cdx.CliSubprocessTests
